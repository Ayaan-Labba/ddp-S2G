# =============================================================================
# S2G — Fine-tuning Configuration
# =============================================================================
# Dataset-specific hyperparameter suggestions (override via CLI dotlist):
#
#   CoNLL04  (~922 train, 4 ent types, 5 rel types):
#     train.max_steps=10_000  optimizer.lr=1e-4  scheduler.warmup_steps=500
#     tokenization.max_source_length=256  tokenization.max_target_length=128
#
#   NYT-multi (~56K train, 3 ent types, ~25 rel types):
#     train.max_steps=60_000  optimizer.lr=5e-5  scheduler.warmup_steps=2_000
#     tokenization.max_source_length=384  tokenization.max_target_length=200
#
#   SciERC (~5K sent, 6 ent types, 7 rel types):
#     train.max_steps=20_000  optimizer.lr=5e-5  scheduler.warmup_steps=1_000
#     tokenization.max_source_length=512  tokenization.max_target_length=256
#
# Run with:
#   python -m s2g.scripts.train --config configs/finetune.yaml \
#       model.pretrained_checkpoint=outputs/pretrain/best_model \
#       data.data_dir=data/conll04 \
#       data.schema_file=data/conll04/relation.schema \
#       data.entity_schema_file=data/conll04/entity.schema \
#       data.output_dir=outputs/finetune/conll04
# =============================================================================

model:
  name: google/flan-t5-base
  pretrained_checkpoint: null       # Set to pre-trained checkpoint path
  model_variant: joint              # "re" | "boundary_re" | "joint" | "boundary_joint"

tokenization:
  max_source_length: 300
  max_target_length: 150

optimizer:
  optim: adamw_torch
  lr: 5.0e-5
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 1000

train:
  max_steps: 20000
  batch_size: 8                     # Per-device; effective batch = batch_size * grad_acc * num_gpus
  gradient_acc_steps: 4
  gradient_clip_value: 10.0
  gradient_checkpointing: false
  precision: bf16
  seed: 0

validation:
  check_interval: 500
  percent_check: 1.0                # Evaluate on full val set
  train_eval_percent_check: 0.05    # 5% train subsample for train/val gap monitoring
  batch_size: 32
  early_stopping_patience: 10
  early_stopping_metric: boundary_f1   # boundary_f1 (all variants) | strict_f1 (re/joint, includes types)

generation:
  num_beams: 4
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false        # False at training time; enable in evaluate.py

ssi:
  max_ent_types: null     # null = use full entity schema (good for small schemas like CoNLL04)
  max_rel_types: null     # null = use full relation schema
  random_prompt: false
  ssi_prompt: ssi

checkpoint:
  save_top_k: 3
  every_n_steps: 1000
  resume_from: null

callbacks:
  sample_generation_interval: 2000

wandb:
  project: s2g
  entity: null
  run_name: null

data:
  data_dir: null                    # e.g. data/conll04
  schema_file: null                 # e.g. data/conll04/relation.schema
  entity_schema_file: null          # e.g. data/conll04/entity.schema
  output_dir: outputs/finetune

hardware:
  num_workers: 4
  persistent_workers: true
  gpu_ids: null
sel:
  random_sel: false
  use_rejection: false
  warm_start: true
