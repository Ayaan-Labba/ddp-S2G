# =============================================================================
# S2G — Evaluation Configuration
# =============================================================================
# Usage:
#   python -m s2g.scripts.evaluate --config configs/evaluate.yaml \
#       model.pretrained_checkpoint=outputs/finetune/conll04/best_model \
#       data.data_dir=data/conll04 \
#       data.schema_file=data/conll04/relation.schema \
#       data.entity_schema_file=data/conll04/entity.schema \
#       data.output_dir=outputs/finetune/conll04/eval \
#       evaluation.split=test
# =============================================================================

model:
  pretrained_checkpoint: null       # Required: path to trained checkpoint dir
  model_variant: pipeline           # Auto-detected from model_variant.txt if present

tokenization:
  max_source_length: 300
  max_target_length: 150

generation:
  num_beams: 4
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false        # Set true for FSM-constrained evaluation

evaluation:
  split: test                       # "val" or "test"

validation:
  batch_size: 32                    # Inference batch size

train:
  seed: 0

data:
  data_dir: null
  schema_file: null
  entity_schema_file: null
  output_dir: outputs/eval

hardware:
  num_workers: 4
  gpu_ids: null