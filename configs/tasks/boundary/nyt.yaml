# =============================================================================
# S2G — NYT-Multi Fine-tuning Configuration (Empirical SOTA Flan-T5-Large)
# =============================================================================

model:
  name: google/flan-t5-large
  pretrained_checkpoint: null
  model_variant: pipeline

tokenization:
  max_source_length: 512
  max_target_length: 512            # Elevated target ceiling for long schema outputs

optimizer:
  optim: adamw_torch
  lr: 2.0e-5                        # Dropped to 2e-5 exactly per large scale parameters
  weight_decay: 0.01                # UIE benchmark baseline defaults to 0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 3360                # Exactly 12% linear warmup across 4 full epochs

train:
  max_steps: 28000                   # 8 full structural validation epochs over ~56k entries
  batch_size: 16                     # Reconciled to Wadhwa et al. hardware run specs
  gradient_acc_steps: 1
  gradient_clip_value: 1.0
  gradient_checkpointing: True
  precision: fp32
  seed: 0

validation:
  check_interval: 1750              
  percent_check: 1.0
  train_eval_percent_check: 0.09
  batch_size: 64
  early_stopping_patience: 4
  early_stopping_metric: strict_f1

generation:
  num_beams: 1
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false

ssi:
  mode: budget
  max_ent_types_in_prompt: null     
  max_rel_types_in_prompt: null     
  random_prompt: false
  random_sel: false
  use_rejection: false

checkpoint:
  save_top_k: 3
  every_n_steps: 2000
  resume_from: null

callbacks:
  sample_generation_interval: 3500

wandb:
  project: s2g
  entity: null
  run_name: s2g-large-nyt

data:
  data_dir: data/nyt
  schema_file: data/nyt/relation.schema
  entity_schema_file: data/nyt/entity.schema
  output_dir: outputs/finetune/nyt

hardware:
  num_workers: 4
  persistent_workers: true
  gpu_ids: null