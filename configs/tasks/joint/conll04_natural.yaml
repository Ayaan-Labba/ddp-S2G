# =============================================================================
# S2G — CoNLL04 Fine-tuning Configuration (Empirical SOTA Flan-T5-Large)
# =============================================================================

model:
  name: google/flan-t5-base
  pretrained_checkpoint: null       
  model_variant: joint           

tokenization:
  max_source_length: 240
  max_target_length: 200            # Max values from `measure_lengths.py`

optimizer:
  optim: adamw_torch
  lr: 5.0e-5                        
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: constant_with_warmup
  warmup_steps: 1392                    # ~12% linear warmup across 200 epochs

train:
  max_steps: 11600                     # ~200 epochs over 922 sentences with effective batch size 32
  batch_size: 16                     
  gradient_acc_steps: 1              
  gradient_clip_value: 1.0
  gradient_checkpointing: False      
  precision: "bf16"
  seed: 0

validation:
  check_interval: 58               # Validate once per epoch
  percent_check: 1.0
  train_eval_percent_check: 0.25
  batch_size: 256
  early_stopping_patience: 20
  early_stopping_metric: strict_f1

generation:
  num_beams: 1                     
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false        

ssi:
  mode: budget
  max_ent_types_in_prompt: null
  max_rel_types_in_prompt: null
  random_prompt: false
  random_sel: false
  use_rejection: false
  ssi_prompt: natural

checkpoint:
  save_top_k: 3
  every_n_steps: 100000
  resume_from: null

callbacks:
  sample_generation_interval: 580

wandb:
  project: s2g
  entity: null
  run_name: joint-base-conll04-n

data:
  data_dir: data/conll04
  schema_file: data/conll04/relation.schema
  entity_schema_file: data/conll04/entity.schema
  output_dir: outputs/finetune/joint-base-conll04-n

hardware:
  num_workers: 4
  persistent_workers: true
  gpu_ids: [0]