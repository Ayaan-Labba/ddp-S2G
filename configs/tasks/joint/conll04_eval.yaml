# =============================================================================
# S2G — Evaluation Configuration
# =============================================================================
# Usage:
#   python -m s2g.scripts.evaluate --config configs/evaluate.yaml \
#       model.pretrained_checkpoint=outputs/finetune/conll04/best_model \
#       data.data_dir=data/conll04 \
#       data.schema_file=data/conll04/relation.schema \
#       data.entity_schema_file=data/conll04/entity.schema \
#       data.output_dir=outputs/finetune/conll04/eval \
#       evaluation.split=test
# =============================================================================

model:
  pretrained_checkpoint: outputs/finetune/j-b-conll04-np/best_model       # Required: path to trained checkpoint dir
  model_variant: joint           # Auto-detected from model_variant.txt if present

data:
  data_dir: data/conll04
  schema_file: data/conll04/relation.schema
  entity_schema_file: data/conll04/entity.schema
  output_dir: outputs/finetune/j-b-conll04-np/eval

tokenization:
  max_source_length: 250
  max_target_length: 190

ssi:
  ssi_prompt: natural

generation:
  num_beams: 3
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false        # Set true for FSM-constrained evaluation

evaluation:
  split: test                       # "val" or "test"

validation:
  batch_size: 128                    # Inference batch size

train:
  seed: 0

hardware:
  num_workers: 4
  gpu_ids: [0]