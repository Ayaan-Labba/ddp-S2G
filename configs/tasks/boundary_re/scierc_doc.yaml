# =============================================================================
# S2G — SciERC Fine-tuning Configuration (Empirical SOTA Flan-T5-Large)
# =============================================================================

model:
  name: google/flan-t5-large
  pretrained_checkpoint: null
  model_variant: boundary_re

tokenization:
  max_source_length: 512            
  max_target_length: 512            

optimizer:
  optim: adamw_torch
  lr: 3.0e-5                        # Follows standard dense extraction parameter tracks
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 550                 # Balanced 12% scale projection across 10 epochs

train:
  max_steps: 4650                   # 10 full structural domain processing loops (1,861 train sents)
  batch_size: 4                     
  gradient_acc_steps: 1             
  gradient_clip_value: 1.0
  gradient_checkpointing: true
  precision: bf16
  seed: 0

validation:
  check_interval: 465               # Check exactly once per epoch loop
  percent_check: 1.0
  train_eval_percent_check: 0.05
  batch_size: 16                    
  early_stopping_patience: 3
  early_stopping_metric: boundary_f1

generation:
  num_beams: 3
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false

ssi:
  max_ent_types: null
  max_rel_types: null
  random_prompt: false

checkpoint:
  save_top_k: 3
  every_n_steps: 465
  resume_from: null

callbacks:
  sample_generation_interval: 930

wandb:
  project: s2g
  entity: null
  run_name: flan-t5-large-scierc-sota

data:
  data_dir: data/scierc_doc
  schema_file: data/scierc_doc/relation.schema
  entity_schema_file: data/scierc_doc/entity.schema
  output_dir: outputs/finetune/scierc_doc

hardware:
  num_workers: 4
  persistent_workers: true
  gpu_ids: null
sel:
  random_sel: false
  use_rejection: false
  warm_start: true
